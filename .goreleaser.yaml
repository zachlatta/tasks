version: 2

project_name: task-tracker

before:
  hooks:
    - go mod verify
    - go test ./...

builds:
  - id: task-tracker
    main: ./cmd/task-tracker
    binary: task-tracker
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - ids:
      - task-tracker
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

release:
  prerelease: auto

homebrew_casks:
  - name: task-tracker
    binaries:
      - task-tracker
    homepage: https://github.com/zachlatta/task-tracker
    description: Markdown-backed task tracker with CLI, web, and MCP interfaces
    repository:
      owner: zachlatta
      name: task-tracker
      branch: main
      token: '{{ .Env.GITHUB_TOKEN }}'
    directory: Casks
    commit_author:
      name: github-actions[bot]
      email: 41898282+github-actions[bot]@users.noreply.github.com
