name: Edge release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: edge-release
  cancel-in-progress: true

jobs:
  release:
    runs-on: [self-hosted, linux, x64, rotom-builder]
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Build snapshot archives
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Replace rolling edge release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete edge --cleanup-tag --yes || true
          git tag --force edge "$GITHUB_SHA"
          git push --force origin refs/tags/edge
          gh release create edge dist/*.tar.gz dist/*.zip dist/checksums.txt \
            --prerelease \
            --target "$GITHUB_SHA" \
            --title "Edge ${GITHUB_SHA::7}" \
            --notes "Automated build of commit $GITHUB_SHA. This rolling prerelease is replaced by every commit to main."
      - name: Update Homebrew formula
        run: |
          version="$(jq -r .version dist/metadata.json)"
          go run ./cmd/update-homebrew-formula \
            zachlatta/tasks \
            "0.0.0.$GITHUB_RUN_NUMBER" \
            "$version" \
            dist/checksums.txt \
            Formula/tasks.rb
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/tasks.rb
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Update Homebrew formula for ${GITHUB_SHA::7} [skip ci]"
          git push origin HEAD:main
