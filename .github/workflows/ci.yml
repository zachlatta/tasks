name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Verify modules
        run: go mod verify
      - name: Test
        run: go test -race ./...
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./cmd/task-tracker
